x-postgres-common:
  &postgres-common
  image: ghcr.io/zalando/spilo-16:${SPILO_VERSION}
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    - net_data

networks:
  net_front:
  net_data:

volumes:
  etcd_data:
  pg1_data:
  pg2_data:
  grafana_data:
  pgadmin_data:

services:
  etcd:
    image: quay.io/coreos/etcd:${ETCD_VERSION}
    container_name: etcd
    command: >
      etcd --name etcd0
      --data-dir /etcd-data
      --advertise-client-urls http://etcd:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-advertise-peer-urls http://etcd:2380
      --listen-peer-urls http://0.0.0.0:2380
      --initial-cluster etcd0=http://etcd:2380
      --initial-cluster-token ${ETCD_INITIAL_CLUSTER_TOKEN}
      --initial-cluster-state new
    volumes:
      - etcd_data:/etcd-data
    networks:
      - net_data
    restart: unless-stopped

  postgres1:
    <<: *postgres-common
    container_name: postgres1
    env_file: ../.env
    environment:
      SCOPE: ${PATRONI_SCOPE}
      PATRONI_NAME: postgres1
      ETCD3_HOST: etcd:2379
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD}
      PATRONI_REPLICATION_USERNAME: ${PATRONI_REPLICATION_USER}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD}
    volumes:
      - pg1_data:/home/postgres/pgdata
      - ./patroni/patroni1.yml:/home/postgres/patroni.yml:ro
    ports:
      - "5432:5432"
    depends_on:
      - etcd

  postgres2:
    <<: *postgres-common
    container_name: postgres2
    env_file: ../.env
    environment:
      SCOPE: ${PATRONI_SCOPE}
      PATRONI_NAME: postgres2
      ETCD3_HOST: etcd:2379
      PATRONI_SUPERUSER_USERNAME: ${POSTGRES_USER}
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD}
      PATRONI_REPLICATION_USERNAME: ${PATRONI_REPLICATION_USER}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD}
    volumes:
      - pg2_data:/home/postgres/pgdata
      - ./patroni/patroni2.yml:/home/postgres/patroni.yml:ro
    ports:
      - "5433:5432"
    depends_on:
      - etcd
      - postgres1

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION}
    container_name: postgres_exporter
    env_file: ../.env
    depends_on:
      postgres1:
        condition: service_healthy
    networks:
      - net_data
    restart: unless-stopped

  data_service:
    build:
      context: ../data
      dockerfile: Dockerfile
    container_name: data_service
    env_file: ../.env
    expose:
      - "8001"
    networks:
      - net_data
    restart: unless-stopped
    depends_on:
      postgres1:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    env_file: ../.env
    expose:
      - "3000"
    networks:
      - net_front
      - net_data
    restart: unless-stopped
    depends_on:
      postgres1:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    expose:
      - "80"
    networks:
      - net_front
    restart: unless-stopped

  reverse-proxy:
    image: nginx:${NGINX_VERSION}
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/placeholder:/usr/share/nginx/html:ro
    networks:
      - net_front
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - net_data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - net_data
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    env_file: ../.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    networks:
      - net_data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: pgadmin
    env_file: ../.env
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - net_data
    restart: unless-stopped